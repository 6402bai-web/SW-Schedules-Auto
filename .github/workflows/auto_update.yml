name: Global Shortwave Auto Update

on:
  workflow_dispatch:      # 手动触发
  schedule:
    - cron: '0 0 * * *'   # 每天运行

jobs:
  update_data:
    runs-on: ubuntu-latest
    # 显式声明权限，双重保险
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run Script
        run: python update_frequencies.py

      - name: Check files
        run: ls -R  # 这一步会在日志里列出所有文件，方便我们排查

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # 关键修改：直接 add 所有变化的内容
          git add .
          # 只有在有新文件的情况下才进行 commit
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update frequencies $(date)"
            git push
          else
            echo "没有发现数据更新，跳过提交。"
          fi
