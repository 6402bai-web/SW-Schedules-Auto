name: Global Shortwave Auto Update

on:
  workflow_dispatch:      # 手动触发
  schedule:
    - cron: '0 0 * * *'   # 每天运行

jobs:
  update_data:
    runs-on: ubuntu-latest
    # 显式声明权限，双重保险
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run Script
        run: python update_frequencies.py

      - name: Check files
        run: ls -R  # 这一步会在日志里列出所有文件，方便我们排查

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add languages/*.csv countries/*.csv
          # 只有当有文件变化时才提交，防止报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update frequencies $(date)" && git push)
